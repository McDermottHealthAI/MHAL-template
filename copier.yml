# Copier configuration for the MHAL-template project template.
# See https://copier.readthedocs.io/en/stable/configuring/

_subdirectory: template
_min_copier_version: "9.0.0"

# Use [[ ]] instead of {{ }} for Jinja delimiters so GitHub Actions workflow
# files (which use ${{ ... }} for context interpolation) render unmolested.
# Block syntax becomes [% %] and comments become [# #].
_envops:
  variable_start_string: "[["
  variable_end_string: "]]"
  block_start_string: "[%"
  block_end_string: "%]"
  comment_start_string: "[#"
  comment_end_string: "#]"

# Patterns excluded from rendering (relative to _subdirectory above).
# uv.lock is regenerated by `uv sync` after render, so we don't ship a stale
# lockfile baked with the placeholder package name.
_exclude:
  - "uv.lock"
  - "**/__pycache__"
  - "**/.pytest_cache"
  - "**/.ruff_cache"
  - "**/.venv"
  - "**/*.egg-info"

# Post-render tasks: initialize a git repo and make an initial commit so that
# setuptools-scm can derive a version (otherwise `uv sync` fails on the
# editable install of the package itself). Requires `copier copy --trust`.
_tasks:
  - "git init -q"
  - "git add ."
  - 'git -c user.email=template@example.com -c user.name=copier commit -q -m "Initial commit from MHAL-template"'

# Post-render messaging.
_message_after_copy: |
  Your project "[[ github_repo ]]" has been scaffolded into [[ _copier_conf.dst_path ]].

  A git repo was initialized with an initial commit so setuptools-scm has
  history to derive a version from. Next steps:

    1. cd [[ _copier_conf.dst_path ]]
    2. uv sync                       # install dependencies
    3. uv run pre-commit install     # register pre-commit hooks (rewrites the
                                     # initial commit if any hooks auto-fix)
    4. Re-author the initial commit with your real identity, e.g.
       `git commit --amend --reset-author -m "Initial commit"`
    5. Create a GitHub repo at github.com/[[ github_org ]]/[[ github_repo ]] and push.

  See CONTRIBUTORS.md in the generated project for the full development guide.

# Project identity
package_name:
  type: str
  help: |
    Python package name. Lowercase, no hyphens. Used as the import name and the
    src/<package_name>/ directory. Example: my_research_project
  validator: >-
    [% if not (package_name | regex_search('^[a-z][a-z0-9_]*$')) %]
    Must be lowercase letters, digits, and underscores; must start with a letter.
    [% endif %]

pypi_name:
  type: str
  help: |
    PyPI distribution name. Often the same as package_name but with underscores
    converted to hyphens.
  default: "[[ package_name | replace('_', '-') ]]"

package_description:
  type: str
  help: One-line description for pyproject.toml.
  default: "TODO: describe your package."

# Author / org
author_name:
  type: str
  help: "Author name (e.g., 'Matthew McDermott')."

author_email:
  type: str
  help: Author email.

github_org:
  type: str
  help: GitHub organization (or user) that hosts the repository.
  default: "McDermottHealthAI"

github_repo:
  type: str
  help: GitHub repository name. Often the same as pypi_name.
  default: "[[ pypi_name ]]"

# Other choices
license:
  type: str
  help: License for the project.
  choices:
    - MIT
    - Apache-2.0
    - BSD-3-Clause
  default: MIT

python_version:
  type: str
  help: Minimum Python version (used in .python-version and pyproject.toml requires-python).
  default: "3.12"
